<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#060a10"/>

  <!-- Reference grid lines (like OSA grid) -->
  <line x1="4" y1="38" x2="60" y2="38" stroke="#0d1f35" stroke-width="0.6" stroke-dasharray="2,4"/>
  <line x1="4" y1="46" x2="60" y2="46" stroke="#142338" stroke-width="0.8"/>

  <!-- DWDM channel fills (area under curve) -->
  <path d="M4,46 Q11,16 18,46 Z"  fill="#34d399" opacity="0.10"/>
  <path d="M18,46 Q25,30 32,46 Z" fill="#34d399" opacity="0.07"/>
  <path d="M32,46 Q39,12 46,46 Z" fill="#34d399" opacity="0.14"/>
  <path d="M46,46 Q53,26 60,46 Z" fill="#34d399" opacity="0.08"/>

  <!-- DWDM channel peak curves -->
  <path d="M4,46 Q11,16 18,46"  stroke="#34d399" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M18,46 Q25,30 32,46" stroke="#34d399" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M32,46 Q39,12 46,46" stroke="#34d399" stroke-width="1.9" fill="none" stroke-linecap="round"/>
  <path d="M46,46 Q53,26 60,46" stroke="#34d399" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.70"/>

  <!-- Peak markers (channel dots) -->
  <circle cx="11" cy="16" r="1.5" fill="#34d399" opacity="0.75"/>
  <circle cx="25" cy="30" r="1.2" fill="#34d399" opacity="0.55"/>
  <circle cx="39" cy="12" r="2.0" fill="#34d399"/>
  <circle cx="53" cy="26" r="1.5" fill="#34d399" opacity="0.70"/>

  <!-- AA initials -->
  <text
    x="32" y="11"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="11"
    fill="white"
    text-anchor="middle"
    letter-spacing="3"
  >AA</text>
</svg>
